<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="./assets/css/styles.css" rel="stylesheet">
    <style>
        .countryWrapper {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .countryWrapper div {
            background: #f8fafc;
            border: 1px solid #dbe3ee;
            border-radius: 10px;
            padding: 0.9rem;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 900px) {
            .countryWrapper {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .countryWrapper {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <header id="banner">
        <div class="nav-container">
            <a class="brand" href="./index.html"><i class="fa-solid fa-code"></i>WebDev 2026</a>
            <ul id="menu">
                <li><a href="./index.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="./pages/projects.html"><i class="fa-solid fa-diagram-project"></i>Projects</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section>
            <h2>Country Directory</h2>
            <p id="totalCountries" class="lead"></p>
            <div class="countryWrapper" id="countryWrapper"></div>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <p>Web Development 2026 by Asabeneh. All rights reserved.</p>
        </div>
    </footer>

    <script src="./countries-list.js"></script>
    <script>
        const totalCountries = document.getElementById('totalCountries')
        const countryWrapper = document.getElementById('countryWrapper')

        totalCountries.textContent = `Total number of countries: ${countries.length}`

        for (const country of countries) {
            const div = document.createElement('div')
            div.textContent = country
            countryWrapper.appendChild(div)
        }
    </script>
</body>

</html>
