<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Number Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="./assets/css/styles.css" rel="stylesheet">
    <style>
        .wrapper {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            gap: 0.6rem;
        }

        .wrapper div {
            border-radius: 8px;
            color: #ffffff;
            text-align: center;
            padding: 0.8rem 0;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .wrapper {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .wrapper {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>
    <header id="banner">
        <div class="nav-container">
            <a class="brand" href="./index.html"><i class="fa-solid fa-code"></i>WebDev 2026</a>
            <ul id="menu">
                <li><a href="./index.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="./pages/projects.html"><i class="fa-solid fa-diagram-project"></i>Projects</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section>
            <h2>DOM Number Board</h2>
            <p class="lead">Prime numbers are highlighted in coral, even numbers in green, and odd numbers in amber.</p>
            <div id="numberWrapper" class="wrapper"></div>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <p>Web Development 2026 by Asabeneh. All rights reserved.</p>
        </div>
    </footer>

    <script>
        function isPrime(n) {
            if (n < 2) return false
            if (n === 2) return true
            for (let i = 2; i < n; i++) {
                if (n % i === 0) {
                    return false
                }
            }
            return true
        }

        const wrapper = document.getElementById('numberWrapper')

        for (let i = 0; i < 101; i++) {
            const div = document.createElement('div')
            div.textContent = i

            if (isPrime(i)) {
                div.style.backgroundColor = '#f97316'
            } else if (i % 2 === 0) {
                div.style.backgroundColor = '#0f766e'
            } else {
                div.style.backgroundColor = '#d97706'
            }

            wrapper.appendChild(div)
        }
    </script>
</body>

</html>
