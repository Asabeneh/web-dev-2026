<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Paradise Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="./assets/css/styles.css" rel="stylesheet">
    <style>
        .top-tools {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.9rem;
            margin-bottom: 1rem;
        }

        .cat-meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
            color: #475569;
            font-weight: 600;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .category-buttons button.active-category {
            background: #0f172a;
            color: #ffffff;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.9rem;
        }

        .cat-card {
            border: 1px solid #dbe3ee;
            border-radius: 12px;
            background: #f8fafc;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .cat-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #e2e8f0;
            border-bottom: 1px solid #dbe3ee;
        }

        .cat-card-content {
            padding: 0.95rem;
        }

        .cat-card h3 {
            margin-bottom: 0.45rem;
            font-family: "Space Grotesk", sans-serif;
        }

        .cat-card p {
            margin-bottom: 0.35rem;
            color: #334155;
            font-size: 0.9rem;
        }

        .status {
            color: #475569;
            font-weight: 600;
            margin-top: 0.7rem;
        }

        @media (max-width: 900px) {
            .cat-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .cat-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header id="banner">
        <div class="nav-container">
            <a class="brand" href="./index.html"><i class="fa-solid fa-laptop-code"></i>Web Learning Lab</a>
            <ul id="menu">
                <li><a href="./index.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="./pages/projects.html"><i class="fa-solid fa-diagram-project"></i>Projects</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section>
            <h2>Cat Paradise</h2>
            <p class="lead">Explore all cat breeds as cards with image and detailed information. Use search and category filters.</p>

            <div class="cat-meta">
                <span id="totalCount">Total Breeds: 0</span>
                <span id="visibleCount">Showing: 0</span>
            </div>

            <div class="top-tools">
                <input id="search" type="text" placeholder="Search by breed, origin, temperament, or life span">
                <div class="category-buttons" id="categoryButtons">
                    <button type="button" data-category="All" class="active-category">All</button>
                    <button type="button" data-category="Hairless">Hairless</button>
                    <button type="button" data-category="Hypoallergenic">Hypoallergenic</button>
                    <button type="button" data-category="Rare">Rare</button>
                    <button type="button" data-category="Popular">Popular</button>
                </div>
            </div>

            <div class="cat-grid" id="catGrid"></div>
            <p id="status" class="status"></p>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <p>Web Learning Lab. Standalone learning material for HTML, CSS, and JavaScript.</p>
        </div>
    </footer>

    <script>
        const searchInput = document.getElementById('search')
        const catGrid = document.getElementById('catGrid')
        const categoryButtons = document.getElementById('categoryButtons')
        const totalCount = document.getElementById('totalCount')
        const visibleCount = document.getElementById('visibleCount')
        const status = document.getElementById('status')

        let allCats = []
        let activeCategory = 'All'
        let searchTerm = ''

        function getCategory(cat) {
            if (cat.hairless === 1) return 'Hairless'
            if (cat.hypoallergenic === 1) return 'Hypoallergenic'
            if (cat.rare === 1) return 'Rare'
            return 'Popular'
        }

        function getImageUrl(cat) {
            if (cat.image && cat.image.url) return cat.image.url
            if (cat.reference_image_id) return `https://cdn2.thecatapi.com/images/${cat.reference_image_id}.jpg`
            return 'https://placehold.co/640x420/e2e8f0/334155?text=Cat+Image'
        }

        function renderCats(cats) {
            catGrid.innerHTML = cats.map((cat) => `
                <article class="cat-card">
                    <img class="cat-image" src="${getImageUrl(cat)}" alt="${cat.name}">
                    <div class="cat-card-content">
                        <h3>${cat.name}</h3>
                        <p><strong>Origin:</strong> ${cat.origin || 'N/A'}</p>
                        <p><strong>Category:</strong> ${getCategory(cat)}</p>
                        <p><strong>Temperament:</strong> ${cat.temperament || 'N/A'}</p>
                        <p><strong>Life Span:</strong> ${cat.life_span || 'N/A'} years</p>
                        <p><strong>Weight:</strong> ${cat.weight?.metric || 'N/A'} kg</p>
                        <p><strong>Description:</strong> ${cat.description || 'N/A'}</p>
                    </div>
                </article>
            `).join('')
        }

        function filterCats() {
            const filtered = allCats.filter((cat) => {
                const category = getCategory(cat)
                const matchCategory = activeCategory === 'All' || category === activeCategory
                const text = `${cat.name} ${cat.origin} ${cat.temperament} ${cat.life_span}`.toLowerCase()
                const matchSearch = text.includes(searchTerm.toLowerCase())
                return matchCategory && matchSearch
            })

            renderCats(filtered)
            visibleCount.textContent = `Showing: ${filtered.length}`

            if (filtered.length === 0) {
                status.textContent = 'No cats matched your filter. Try a different search or category.'
            } else {
                status.textContent = ''
            }
        }

        async function loadCats() {
            status.textContent = 'Loading all cat breeds...'
            try {
                const response = await fetch('https://api.thecatapi.com/v1/breeds')
                if (!response.ok) throw new Error('Failed to load cat breeds')

                const data = await response.json()
                allCats = data

                totalCount.textContent = `Total Breeds: ${allCats.length}`
                filterCats()
                status.textContent = ''
            } catch (error) {
                status.textContent = 'Could not load cat data right now. Please refresh and try again.'
                console.error(error)
            }
        }

        searchInput.addEventListener('input', (event) => {
            searchTerm = event.target.value
            filterCats()
        })

        categoryButtons.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-category]')
            if (!button) return

            activeCategory = button.dataset.category
            document.querySelectorAll('#categoryButtons button').forEach((btn) => btn.classList.remove('active-category'))
            button.classList.add('active-category')
            filterCats()
        })

        loadCats()
    </script>
</body>

</html>
